name: Build Custom Mastodon

on:
  push:
    branches:
      - "build/*" # 当你创建 build/4.5.2 时自动构建
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        component:
          - name: web
            image: bailongctui/mastodon
            dockerfile: ./Dockerfile
          - name: streaming
            image: bailongctui/mastodon-streaming
            dockerfile: ./streaming/Dockerfile

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 从分支名 build/4.5.2 中提取 VERSION=4.5.2
      - name: Extract version from branch
        id: version
        run: |
          RAW_REF="${GITHUB_REF##*/}"       # build/4.5.2
          VERSION="${RAW_REF#build/}"       # 4.5.2
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.component.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION }}
            type=raw,value=${{ steps.version.outputs.VERSION }}-custom
            type=raw,value=latest

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.component.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
